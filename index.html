<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رسالة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#050505,#111,#1a1a1a);
color:#fff;
overflow-x:hidden;
}

.center-heart{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:999;
flex-direction:column;
}

.heart-btn{
font-size:80px;
cursor:pointer;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.container{
display:none;
padding:20px;
text-align:center;
}

.slider{
  width:90%;
  max-width:600px;
  margin:30px auto;
}

.slider img{
  width:100%;
  display:block;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

.memories{
margin-top:20px;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
}

</style>
</head>

<body>

<!-- ❤️ البداية -->
<div class="center-heart" id="startScreen">
  <div class="heart-btn" onclick="start()">❤️</div>
  <p>اضغط القلب للدخول</p>
</div>

<!-- المحتوى -->
<div class="container" id="main">

<h1>إلى أجمل حد في حياتي ❤️</h1>

<!-- 🎵 أغنية -->
<audio id="music">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">▶ تشغيل الأغنية</button>

<!-- 🎬 Slider -->
<div class="slider">
  <img id="sliderImage" src="1.jpg" alt="Memory">
</div>

<!-- ⏳ العد التنازلي -->
<div class="countdown" id="countdown"></div>

<!-- 💭 ذكريات -->
<div class="memories">
<h3>ذكرياتنا 💭</h3>
<p>كل لحظة كنت فيها موجود معاكي كانت مختلفة ومميزة.</p>
<p>ضحكتك عندي أهم من أي حاجة في الدنيا.</p>
<p>حتى وقت الزعل، كنتِ دايمًا أقرب حاجة لقلبي
  انا بحبك بجد انا مش احسن شخص فى العالم بس بحبك من قلبى .</p>
</div>

</div>

<script>

let music=document.getElementById("music");

function start(){
document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";
music.play();
}

// 🎵 تشغيل/إيقاف
function toggleMusic(){
  if(music.paused){
    music.play();
    event.target.innerHTML = "⏸ إيقاف الأغنية";
  }else{
    music.pause();
    event.target.innerHTML = "▶ تشغيل الأغنية";
  }
}

// 🎬 Slider بسيط
let index=0;
setInterval(()=>{
let slides=document.getElementById("slides");
index=(index+1)%3;
slides.style.transform=`translateX(-${index*100}%)`;
},3000);

// ⏳ Countdown
let target=new Date("2026-03-02T01:30:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=target-now;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((diff%(1000*60*60))/(1000*60));
let s=Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
`⏳ باقي: ${d} يوم - ${h} ساعة - ${m} دقيقة - ${s} ثانية`;

},1000);
const images = [
  "1.jpg",
  "2.jpg",
  "3.jpg"
];

let currentImage = 0;

setInterval(() => {
  currentImage++;

  if(currentImage >= images.length){
    currentImage = 0;
  }

  document.getElementById("sliderImage").src =
    images[currentImage];

}, 3000);
</script>

</body>
</html>
